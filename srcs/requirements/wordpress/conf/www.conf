[www]
user = www-data
group = www-data
listen = 0.0.0.0:${WORDPRESS_PORT_INTERNAL}

pm = dynamic
pm.max_children = 5
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3

php_admin_value[error_log] = /var/log/fpm-php/www.log
php_admin_flag[log_errors] = on
php_admin_value[memory_limit] = 256M
